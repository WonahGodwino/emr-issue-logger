name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Run Backend Tests
        working-directory: ./backend
        run: |
          go test -v ./...
          go test -v -race ./...
  
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Run Frontend Tests
        working-directory: ./frontend
        run: npm run test -- --no-watch --no-progress --browsers=ChromeHeadless
  
  build-and-deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Backend
        working-directory: ./backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/emr-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/emr-backend:latest
      - name: Build and Push Frontend
        working-directory: ./frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/emr-frontend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/emr-frontend:latest
      - name: Deploy to Production
        run: |
          echo "Deploying to production server..."
