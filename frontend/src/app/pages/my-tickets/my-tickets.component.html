<div class="page-container">
  <div class="page-header"><h2>My Tickets</h2><a routerLink="/tickets/create" class="btn btn-primary">＋ Create Ticket</a></div>
  <table *ngIf="tickets.length>0" class="table-card"><thead><tr><th>ID</th><th>Title</th><th>Status</th><th>Module</th><th>Issue</th><th>Created</th><th>Actions</th></tr></thead>
    <tbody><tr *ngFor="let t of tickets"><td><span class="badge">{{t.ticketId}}</span></td>
      <td><a [routerLink]="['/tickets', t.ticketId]" class="link">{{t.title}}</a></td>
      <td><span class="status" [style.background]="getStatusColor(t.status)+'20'" [style.color]="getStatusColor(t.status)">{{getStatusLabel(t.status)}}</span></td>
      <td>{{t.module}}</td><td class="ellipsis">{{t.issue}}</td><td>{{t.createdAt|date:'mediumDate'}}</td>
      <td class="actions">
        <button class="btn btn-sm btn-outline" (click)="openScreenshotUpload(t)">📸</button>
        <button class="btn btn-sm btn-outline" [routerLink]="['/tickets', t.ticketId]">View</button>
        <button class="btn btn-sm btn-danger" *ngIf="t.status==='pending'" (click)="deleteTicket(t)">Del</button>
      </td></tr></tbody></table>
  <div class="empty" *ngIf="!loading&&tickets.length===0"><p>No tickets yet.</p><a routerLink="/tickets/create">Create one</a></div>
</div>
<div class="modal-overlay" *ngIf="selectedTicket" (click)="onOverlayClick($event)">
  <div class="modal-card"><div class="modal-header"><h3>Upload Screenshot</h3><button class="btn-close" (click)="closeModal()">✕</button></div>
    <div class="modal-body"><input type="file" accept="image/*" (change)="onFileSelected($event)" />
      <button class="btn btn-primary" (click)="uploadScreenshot()" [disabled]="uploading" style="margin-top:12px">{{uploading?'Uploading...':'Upload'}}</button></div></div>
</div>
