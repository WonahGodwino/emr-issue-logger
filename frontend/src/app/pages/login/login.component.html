<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <img src="assets/ECEWS_LOGO.jpg" alt="ECEWS Logo" class="login-logo" />
      <h1>ECEWS EMR Issue Logger</h1>
      <p class="subtitle">Sign in to your account</p>
    </div>

    <div class="alert alert-error" *ngIf="error">
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          required
          email
          placeholder="admin@emr.com"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          minlength="6"
          placeholder="Enter your password"
        />
      </div>

      <button type="submit" [disabled]="!loginForm.valid || loading" class="btn-login">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="register-link">
      Don't have an account? <a routerLink="/register">Create one here</a>
    </p>
  </div>
</div>
